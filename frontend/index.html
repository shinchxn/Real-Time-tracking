<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Content DNA — AI-powered media fingerprinting, tracking, and violation detection platform." />
    <title>Content DNA — Universal Tracking System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- ── Animated Background ─────────────────────────────────── -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="header" id="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
                        <circle cx="14" cy="14" r="4" fill="url(#logoGrad)"/>
                        <defs><linearGradient id="logoGrad" x1="2" y1="2" x2="26" y2="26">
                            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/>
                        </linearGradient></defs>
                    </svg>
                </div>
                <span class="logo-text">Content<span class="logo-accent">DNA</span></span>
            </div>
            <span class="version-badge">v2.0</span>
        </div>
        <div class="header-right">
            <div class="status-indicator" id="systemStatus">
                <span class="status-dot"></span>
                <span class="status-text">Connecting…</span>
            </div>
        </div>
    </header>

    <!-- ── Main Content ────────────────────────────────────────── -->
    <main class="main">

        <!-- Stats Row -->
        <section class="stats-row" id="statsRow">
            <div class="stat-card" id="statAssets">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-value" id="totalAssets">0</span>
                    <span class="stat-label">Indexed Assets</span>
                </div>
            </div>
            <div class="stat-card stat-critical" id="statCritical">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-value" id="criticalCount">0</span>
                    <span class="stat-label">Critical Alerts</span>
                </div>
            </div>
            <div class="stat-card" id="statViolations">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-value" id="totalViolations">0</span>
                    <span class="stat-label">Violations</span>
                </div>
            </div>
            <div class="stat-card" id="statModel">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                </div>
                <div class="stat-body">
                    <span class="stat-value" id="modelName" style="font-size:0.95rem">—</span>
                    <span class="stat-label">CLIP Model</span>
                </div>
            </div>
        </section>

        <!-- Two-Column Layout -->
        <div class="columns">

            <!-- Left: Upload & Detect -->
            <section class="panel upload-panel" id="uploadPanel">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Upload &amp; Detect
                </h2>

                <!-- Mode Toggle -->
                <div class="mode-toggle" id="modeToggle">
                    <button class="mode-btn active" data-mode="upload" id="btnModeUpload">Register Asset</button>
                    <button class="mode-btn" data-mode="detect" id="btnModeDetect">Detect Violation</button>
                    <button class="mode-btn" data-mode="watermark" id="btnModeWatermark">Watermark</button>
                </div>

                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-inner">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="drop-icon">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p class="drop-text">Drop image here or <span class="browse-link">browse</span></p>
                        <p class="drop-hint">Supports JPG, PNG, WebP, GIF — up to 100 MB</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" hidden />
                </div>

                <!-- Preview -->
                <div class="preview-area" id="previewArea" style="display:none">
                    <img id="previewImage" alt="Preview" />
                    <button class="btn-clear" id="btnClear">✕</button>
                </div>

                <!-- Owner / Asset ID fields -->
                <div class="form-row" id="formFields">
                    <div class="form-group">
                        <label for="inputOwner">Owner ID</label>
                        <input type="text" id="inputOwner" placeholder="owner-uuid" />
                    </div>
                    <div class="form-group" id="assetIdGroup" style="display:none">
                        <label for="inputAssetId">Asset ID</label>
                        <input type="text" id="inputAssetId" placeholder="asset-uuid" />
                    </div>
                </div>

                <!-- Submit -->
                <button class="btn-primary" id="btnSubmit" disabled>
                    <span class="btn-text">Upload &amp; Register</span>
                    <span class="btn-loader" style="display:none"></span>
                </button>

                <!-- Result -->
                <div class="result-card" id="resultCard" style="display:none"></div>
            </section>

            <!-- Right: Alerts Feed -->
            <section class="panel alerts-panel" id="alertsPanel">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 01-3.46 0"/>
                    </svg>
                    Alerts &amp; Violations
                </h2>
                <div class="filter-row">
                    <button class="filter-btn active" data-severity="all" id="filterAll">All</button>
                    <button class="filter-btn" data-severity="CRITICAL" id="filterCritical">Critical</button>
                    <button class="filter-btn" data-severity="HIGH" id="filterHigh">High</button>
                    <button class="filter-btn" data-severity="MEDIUM" id="filterMedium">Medium</button>
                </div>
                <div class="alerts-list" id="alertsList">
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <p>No violations detected yet</p>
                    </div>
                </div>
            </section>
        </div>

        <!-- Fingerprint Breakdown (shown after detect) -->
        <section class="panel fingerprint-panel" id="fingerprintPanel" style="display:none">
            <h2 class="panel-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                4-Layer Content DNA Breakdown
            </h2>
            <div class="fingerprint-grid" id="fingerprintGrid"></div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
